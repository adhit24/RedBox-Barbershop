<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasil AI Grooming — Redbox Barbershop</title>
  <link rel="icon" type="image/jpeg" href="Brand_assets/logo_redboxnew.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #c1121f;
      --bg: #050505;
      --panel: #101010;
      --panel-2: #171717;
      --line: rgba(255,255,255,.08);
      --text: #f5f5f5;
      --muted: rgba(255,255,255,.58);
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(193,18,31,.18), transparent 28%),
        linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(5,5,5,.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }
    .nav-logo img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      object-fit: cover;
    }
    .nav-logo span {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .08em;
      font-size: 1.35rem;
    }
    .nav-logo em {
      color: var(--red);
      font-style: normal;
    }
    .nav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav-btn,
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    .nav-btn {
      padding: 10px 15px;
      color: var(--text);
      background: transparent;
    }
    .nav-btn.red,
    .action-btn.red {
      background: var(--red);
      border-color: transparent;
      color: #fff;
    }
    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 28px auto 40px;
    }
    .hero {
      text-align: center;
      margin-bottom: 22px;
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(193,18,31,.14);
      border: 1px solid rgba(193,18,31,.26);
      color: #ffb3ba;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .hero h1 {
      margin-top: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.1rem, 5vw, 4rem);
      letter-spacing: .04em;
      line-height: .95;
    }
    .hero p {
      max-width: 640px;
      margin: 10px auto 0;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.6;
    }
    .result-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.32);
    }
    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      flex-wrap: wrap;
    }
    .result-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .result-title strong {
      font-size: 1rem;
      letter-spacing: .02em;
    }
    .result-title span {
      color: var(--muted);
      font-size: .82rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 700;
    }
    .result-stage {
      padding: 18px;
      background: #090909;
    }
    .graphic-shell {
      aspect-ratio: 4 / 5;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      border: 1px solid var(--line);
      position: relative;
    }
    .graphic-shell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .loading-state,
    .error-state,
    .empty-state {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
    }
    .state-card {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px 22px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 18px;
      border: 3px solid rgba(255,255,255,.12);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .state-card h2 {
      font-size: 1.15rem;
      margin-bottom: 8px;
    }
    .state-card p {
      color: var(--muted);
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .action-btn {
      min-width: 170px;
      padding: 13px 18px;
      background: transparent;
      color: var(--text);
    }
    .footer-note {
      text-align: center;
      color: rgba(255,255,255,.28);
      font-size: .76rem;
      margin-top: 16px;
      letter-spacing: .04em;
    }
    @media (max-width: 640px) {
      .page { width: min(100% - 18px, 1100px); margin-top: 18px; }
      .nav { padding: 12px 14px; }
      .nav-actions { width: 100%; }
      .nav-btn { flex: 1; }
      .result-meta { padding: 14px; }
      .result-stage { padding: 12px; }
      .graphic-shell { border-radius: 16px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="/">
      <img src="Brand_assets/logo_redboxnew.jpeg" alt="Redbox Logo" />
      <span>REDBOX <em>BARBERSHOP</em></span>
    </a>
    <div class="nav-actions">
      <a class="nav-btn" href="/#ai">Coba Lagi</a>
      <a class="nav-btn red" href="/booking.html">Book Now</a>
    </div>
  </nav>

  <main class="page" id="page-root">
    <section class="hero">
      <span class="eyebrow">AI Hairstyle Graphic</span>
      <h1>Simple Visual Result</h1>
      <p>Hasil dibuat sebagai graphic hairstyle analysis yang singkat, visual-first, dan fokus ke wajah customer.</p>
    </section>

    <div class="loading-state" id="loading-state">
      <div class="state-card">
        <div class="spinner"></div>
        <h2>Membuat graphic hairstyle analysis</h2>
        <p>AI sedang menyiapkan hasil visual sederhana berdasarkan foto customer.</p>
      </div>
    </div>

    <div id="result-state" style="display:none"></div>
  </main>

  <script>
    const ANALYSIS_GRAPHIC_PROMPT = [
      'Create a photo hairstyle analysis graphic using this portrait.',
      'Show side-by-side hairstyles comparisons to highlight which hairstyles suit the subject best.',
      'Make it visual-first, with short labels only and no paragraph.',
      'Use a premium black grooming infographic style.',
      'Place the real customer portrait large on the left.',
      'Place the title "HAIRSTYLE ANALYSIS" at the top.',
      'Show 4 recommended hairstyles with green check marks.',
      'Show 2 hairstyles to avoid with red X marks.',
      'Add short sections for hair characteristics, styling guide, recommended products, key tips, and hair color suggestion.',
      'Use only short uppercase labels, clean spacing, realistic hairstyle previews, and no long explanation text.',
      'Keep the same customer identity in all hairstyle comparison images.'
    ].join(' ');

    document.addEventListener('DOMContentLoaded', () => {
      const loadingEl = document.getElementById('loading-state');
      const resultEl = document.getElementById('result-state');

      let uploadId = null;
      let userPhoto = null;
      try {
        uploadId = sessionStorage.getItem('ai_upload_id');
        userPhoto = sessionStorage.getItem('ai_user_photo');
      } catch (e) {}

      if (!uploadId) {
        loadingEl.style.display = 'none';
        resultEl.style.display = 'block';
        resultEl.innerHTML = `
          <div class="empty-state">
            <div class="state-card">
              <h2>Tidak ada hasil ditemukan</h2>
              <p>Upload foto terlebih dahulu di halaman utama untuk membuat hairstyle analysis graphic.</p>
              <div class="actions">
                <a class="action-btn red" href="/#ai">Upload Foto</a>
              </div>
            </div>
          </div>`;
        return;
      }

      generateGraphic(uploadId, userPhoto)
        .then((imageUrl) => {
          loadingEl.style.display = 'none';
          resultEl.style.display = 'block';
          resultEl.innerHTML = `
            <section class="result-card">
              <div class="result-meta">
                <div class="result-title">
                  <strong>Hairstyle Analysis Graphic</strong>
                  <span>Visual-first, short labels only, no paragraph</span>
                </div>
                <div class="badge">AI Generated</div>
              </div>
              <div class="result-stage">
                <div class="graphic-shell">
                  <img src="${imageUrl}" alt="AI hairstyle analysis graphic" />
                </div>
              </div>
            </section>
            <div class="actions">
              <a class="action-btn red" href="/booking.html">Book Appointment</a>
              <a class="action-btn" href="/#ai">Analisis Ulang</a>
              <button class="action-btn" type="button" id="download-btn">Download</button>
            </div>
            <div class="footer-note">Powered by Kinaryaloka for RedBox Barbershop</div>`;

          const downloadBtn = document.getElementById('download-btn');
          if (downloadBtn) {
            downloadBtn.addEventListener('click', () => downloadImage(imageUrl));
          }
        })
        .catch((err) => {
          loadingEl.style.display = 'none';
          resultEl.style.display = 'block';
          resultEl.innerHTML = `
            <div class="error-state">
              <div class="state-card">
                <h2>Graphic belum berhasil dibuat</h2>
                <p>${escapeHtml(err?.message || 'Terjadi kendala saat membuat hasil visual.')}</p>
                <div class="actions">
                  <a class="action-btn red" href="/#ai">Coba Lagi</a>
                </div>
              </div>
            </div>`;
        });
    });

    async function generateGraphic(uploadId, userPhoto) {
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const API = isLocal ? 'http://localhost:3001/api/ai/generate-image' : '/api/ai/generate-image';
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          uploadId,
          prompt: ANALYSIS_GRAPHIC_PROMPT,
          cacheKey: `v5/${uploadId}/hairstyle-analysis-graphic/simple`
        })
      });

      const json = await res.json();
      if (!res.ok || !json.imageUrl) {
        throw new Error(json.error || 'Gagal membuat hairstyle analysis graphic');
      }

      try {
        sessionStorage.setItem('ai_result_graphic', json.imageUrl);
        if (userPhoto) sessionStorage.setItem('ai_user_photo', userPhoto);
      } catch (e) {}

      return json.imageUrl;
    }

    function downloadImage(src) {
      const link = document.createElement('a');
      link.href = src;
      link.download = 'redbox-hairstyle-analysis.png';
      link.click();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
