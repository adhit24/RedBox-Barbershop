<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redbox Barbershop — We'll Be Back Soon</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/jpeg" href="Brand_assets/logo_redboxnew.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C1121F;
      --dark: #0A0A0A;
      --white: #F5F5F5;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: .18;
      filter: blur(80px);
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #C1121F, transparent 70%);
      top: -120px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8B0000, transparent 70%);
      bottom: -100px; right: -80px;
      animation: drift2 14s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(40px, 60px); } }
    @keyframes drift2 { to { transform: translate(-40px, -50px); } }

    /* Noise grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .content {
      position: relative; z-index: 1;
      text-align: center;
      padding: 32px 24px;
      max-width: 560px;
      width: 100%;
    }

    /* Logo area */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .1s forwards;
    }
    .logo-wrap img {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
    }
    .logo-wrap span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .08em;
      color: var(--white);
    }
    .logo-wrap span em {
      color: var(--red);
      font-style: normal;
    }

    /* Divider line */
    .eyebrow {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .2s forwards;
    }
    .eyebrow-line { width: 40px; height: 1px; background: rgba(193,18,31,.5); }
    .eyebrow-text {
      font-size: .68rem; font-weight: 600; letter-spacing: .22em;
      color: rgba(255,255,255,.4); text-transform: uppercase;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 5.5rem);
      line-height: .95;
      letter-spacing: -.01em;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp .8s cubic-bezier(.22,1,.36,1) .3s forwards;
    }
    h1 .line-red { display: block; color: var(--red); }

    p.sub {
      font-size: .93rem;
      line-height: 1.75;
      color: rgba(255,255,255,.5);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .8s cubic-bezier(.22,1,.36,1) .45s forwards;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .8s cubic-bezier(.22,1,.36,1) .55s forwards;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: rgba(255,255,255,.3);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .progress-track {
      height: 3px; background: rgba(255,255,255,.07);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), #ff6b6b);
      border-radius: 99px;
      width: 0;
      animation: fillBar 1.4s cubic-bezier(.22,1,.36,1) .8s forwards;
    }
    @keyframes fillBar { to { width: 78%; } }

    /* WA button */
    .wa-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--red);
      color: #fff; text-decoration: none;
      padding: 14px 28px;
      border-radius: 99px;
      font-size: .88rem; font-weight: 600; letter-spacing: .02em;
      transition: transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s;
      opacity: 0;
      animation: fadeUp .8s cubic-bezier(.22,1,.36,1) .65s forwards;
    }
    .wa-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(193,18,31,.45);
    }
    .wa-btn svg { flex-shrink: 0; }

    /* Footer note */
    .footer-note {
      margin-top: 48px;
      font-size: .72rem; color: rgba(255,255,255,.2);
      letter-spacing: .05em;
      opacity: 0;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .8s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media(max-width:480px){
      h1 { font-size: clamp(2.8rem, 14vw, 4rem); }
      p.sub { font-size: .86rem; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <div class="logo-wrap">
      <img src="Brand_assets/logo_redboxnew.jpeg" alt="Redbox Logo" />
      <span>REDBOX <em>BARBERSHOP</em></span>
    </div>

    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Website Under Construction</span>
      <span class="eyebrow-line"></span>
    </div>

    <h1>
      We're Getting<br>
      <span class="line-red">A Fresh Cut.</span>
    </h1>

    <p class="sub">
      Kami sedang melakukan peningkatan pada website untuk memberikan<br>
      pengalaman terbaik buat kamu. Tunggu sebentar ya!
    </p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span>78%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <a href="https://wa.me/62818202569?text=Halo%20Redbox%2C%20saya%20mau%20booking%20appointment" class="wa-btn" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.521.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.521-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
      Booking via WhatsApp
    </a>

    <p class="footer-note">© 2026 Redbox Barbershop · Cirebon &amp; Tegal &nbsp;·&nbsp; Powered by <a href="https://kinaryaloka.com" target="_blank" rel="noopener" style="color:rgba(255,255,255,.4);text-decoration:underline;text-underline-offset:3px;transition:color .2s" onmouseover="this.style.color='#C1121F'" onmouseout="this.style.color='rgba(255,255,255,.4)'">Kinaryaloka</a></p>
  </div>
</body>
</html>
