<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasil AI Grooming — Redbox Barbershop</title>
  <link rel="icon" type="image/jpeg" href="Brand_assets/logo_redboxnew.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C1121F;
      --dark: #0A0A0A;
      --dark2: #111;
      --dark3: #1a1a1a;
      --border: rgba(255,255,255,.08);
      --white: #F5F5F5;
      --text-sec: rgba(255,255,255,.5);
      --text-dim: rgba(255,255,255,.3);
    }
    body { background: var(--dark); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,10,10,.92); backdrop-filter: blur(12px); z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
    .nav-logo span { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: .08em; color: var(--white); }
    .nav-logo em { color: var(--red); font-style: normal; }
    .nav-actions { display: flex; gap: 10px; }
    .nav-btn { padding: 8px 18px; border-radius: 99px; font-size: .82rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; }
    .nav-btn-ghost { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
    .nav-btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,.2); }
    .nav-btn-red { background: var(--red); color: #fff; }
    .nav-btn-red:hover { opacity: .88; }

    /* PAGE HEADER */
    .results-hero { padding: 40px 24px 32px; text-align: center; }
    .results-hero-eyebrow { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
    .results-hero-line { width: 32px; height: 1px; background: rgba(193,18,31,.5); }
    .results-hero-label { font-size: .68rem; font-weight: 600; letter-spacing: .22em; color: rgba(255,255,255,.4); text-transform: uppercase; }
    .results-hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 6vw, 3.5rem); letter-spacing: .02em; line-height: 1; }
    .results-hero h1 em { color: var(--red); font-style: normal; }
    .results-hero p { color: var(--text-sec); font-size: .9rem; margin-top: 10px; }

    /* USER PHOTO HEADER */
    .ai-user-photo-header { display: flex; align-items: center; gap: 20px; background: var(--dark3); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin: 0 auto 32px; max-width: 680px; }
    .ai-user-photo-wrap { position: relative; flex-shrink: 0; }
    .ai-user-photo { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 2px solid var(--red); }
    .ai-user-photo-label { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: var(--red); color: #fff; font-size: .6rem; font-weight: 700; letter-spacing: .08em; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
    .ai-user-summary { display: flex; flex-wrap: wrap; gap: 8px; }
    .ai-user-summary-tag { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 99px; padding: 5px 14px; font-size: .75rem; font-weight: 500; color: var(--text-sec); }

    /* MAIN CONTENT */
    .results-container { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }

    /* SECTION BLOCK */
    .ai-section-block { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
    .ai-section-header { display: flex; align-items: center; gap: 14px; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .ai-section-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--red); line-height: 1; min-width: 32px; }
    .ai-section-header h3 { font-size: 1rem; font-weight: 600; letter-spacing: .01em; }
    .ai-section-body { padding: 24px; }
    .ai-section-body:has(.hair-infographic) { padding: 0; }
    .ai-section-sub { font-size: .83rem; color: var(--text-sec); margin-bottom: 18px; }
    .ai-section-sub-label { font-size: .68rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }

    /* COLOR ANALYSIS */
    .ai-color-season { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--red); letter-spacing: .04em; margin-bottom: 4px; }
    .ai-color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 16px 0; }
    .ai-color-group label { display: block; font-size: .72rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
    .ai-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
    .ai-swatch { width: 36px; height: 36px; border-radius: 8px; position: relative; cursor: default; border: 1px solid rgba(255,255,255,.1); flex-shrink: 0; }
    .ai-swatch:hover .ai-swatch-tip { opacity: 1; transform: translateY(0); }
    .ai-swatch-tip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%) translateY(4px); background: #222; color: #fff; font-size: .65rem; white-space: nowrap; padding: 3px 8px; border-radius: 6px; opacity: 0; pointer-events: none; transition: all .18s; z-index: 10; }
    .ai-color-formula { background: rgba(193,18,31,.08); border: 1px solid rgba(193,18,31,.2); border-radius: 10px; padding: 12px 16px; font-size: .83rem; color: rgba(255,255,255,.7); margin-top: 16px; }

    /* PHOTO GRID */
    .ai-photo-grid { display: grid; gap: 14px; margin-bottom: 16px; }
    .ai-photo-grid-3 { grid-template-columns: repeat(3, 1fr); }
    .ai-photo-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .ai-photo-card { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .2s; }
    .ai-photo-card:hover { border-color: rgba(255,255,255,.15); }
    .ai-photo-card-avoid { border-color: rgba(193,18,31,.2); }
    .ai-photo-card-img-wrap { position: relative; aspect-ratio: 3/4; background: #1c1c1c; overflow: hidden; }
    .ai-photo-card-img-wide { aspect-ratio: 4/3; }
    .ai-photo-card-img { width: 100%; height: 100%; object-fit: cover; }
    .ai-photo-card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .ai-photo-card-rank { position: absolute; top: 8px; left: 8px; background: var(--red); color: #fff; font-size: .68rem; font-weight: 700; padding: 3px 8px; border-radius: 99px; }
    .ai-photo-card-score { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.6); color: #fff; font-size: .68rem; font-weight: 700; padding: 3px 8px; border-radius: 99px; backdrop-filter: blur(4px); }
    .ai-photo-avoid-x { position: absolute; top: 8px; right: 8px; background: rgba(193,18,31,.8); color: #fff; font-size: .8rem; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .ai-photo-card-body { padding: 12px; }
    .ai-photo-card-category { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: 4px; }
    .ai-photo-card-name { font-size: .88rem; font-weight: 600; margin-bottom: 4px; }
    .ai-photo-card-occasion { font-size: .72rem; color: var(--text-dim); margin-bottom: 8px; }
    .ai-photo-card-pieces { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .ai-outfit-piece { display: inline-flex; align-items: center; gap: 4px; font-size: .65rem; color: var(--text-sec); }
    .ai-outfit-piece-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,.15); }
    .ai-photo-card-why { font-size: .72rem; color: var(--text-sec); line-height: 1.5; }

    /* OUTFIT AVOID */
    .ai-outfit-avoid { margin-top: 16px; }
    .ai-outfit-avoid label { display: block; font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; }
    .ai-avoid-list { display: flex; flex-direction: column; gap: 8px; }
    .ai-avoid-item { display: flex; align-items: flex-start; gap: 10px; font-size: .82rem; color: var(--text-sec); padding: 10px 14px; background: rgba(193,18,31,.05); border: 1px solid rgba(193,18,31,.12); border-radius: 8px; }
    .ai-avoid-x { color: var(--red); font-weight: 700; flex-shrink: 0; }

    /* EYEWEAR */
    .ai-eyewear-colors { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
    .ai-eyewear-color-tag { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 99px; padding: 2px 10px; font-size: .65rem; color: var(--text-sec); }
    .ai-eyewear-protip { background: rgba(255,255,255,.04); border-left: 3px solid var(--red); padding: 12px 16px; font-size: .83rem; color: var(--text-sec); border-radius: 0 8px 8px 0; margin-top: 16px; }

    /* SKINCARE */
    .ai-skincare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .ai-skincare-col label { display: block; font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
    .ai-routine-steps { display: flex; flex-direction: column; gap: 10px; }
    .ai-routine-step { display: flex; align-items: flex-start; gap: 12px; }
    .ai-step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: #fff; font-size: .72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ai-step-info { display: flex; flex-direction: column; gap: 2px; }
    .ai-step-info strong { font-size: .83rem; }
    .ai-step-info span { font-size: .72rem; color: var(--text-sec); }
    .ai-concerns-list { display: flex; flex-direction: column; gap: 10px; }
    .ai-concern-item { background: rgba(255,255,255,.04); border-radius: 8px; padding: 10px 12px; }
    .ai-concern-name { font-size: .83rem; font-weight: 600; margin-bottom: 4px; }
    .ai-concern-severity { font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 6px; }
    .ai-concern-severity.mild { background: rgba(234,179,8,.15); color: #eab308; }
    .ai-concern-severity.moderate { background: rgba(249,115,22,.15); color: #f97316; }
    .ai-concern-severity.severe { background: rgba(193,18,31,.15); color: var(--red); }
    .ai-concern-tip { font-size: .75rem; color: var(--text-sec); line-height: 1.5; }
    .ai-skincare-tips { margin-top: 20px; }
    .ai-skincare-tips label { display: block; font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
    .ai-tips-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .ai-tips-list li { font-size: .82rem; color: var(--text-sec); padding-left: 16px; position: relative; }
    .ai-tips-list li::before { content: '•'; color: var(--red); position: absolute; left: 0; }

    /* ── HAIRSTYLE INFOGRAPHIC ── */
    .hair-infographic { display: flex; flex-direction: column; gap: 0; }

    /* Top row: profile + best grid */
    .hair-top { display: grid; grid-template-columns: 220px 1fr; gap: 0; }

    /* Profile panel */
    .hair-profile-panel { background: #141414; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; border-right: 1px solid var(--border); }
    .hair-profile-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 10px; display: block; }
    .hair-profile-photo-placeholder { width: 100%; aspect-ratio: 3/4; background: #1e1e1e; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .hair-face-shape-block { display: flex; align-items: center; gap: 10px; }
    .hair-face-shape-text .hair-label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; color: var(--text-dim); text-transform: uppercase; }
    .hair-face-shape-text .hair-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: .06em; line-height: 1.1; }
    .hair-face-oval { width: 32px; height: 40px; border: 2px dashed rgba(255,255,255,.25); border-radius: 50%; flex-shrink: 0; }
    .hair-type-section .hair-label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
    .hair-type-icons { display: flex; flex-direction: column; gap: 8px; }
    .hair-type-icon-row { display: flex; align-items: center; gap: 8px; }
    .hair-type-icon-wrap { width: 32px; height: 32px; border: 1px solid rgba(255,255,255,.12); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hair-type-icon-label { font-size: .68rem; font-weight: 600; letter-spacing: .06em; color: var(--text-sec); text-transform: uppercase; }

    /* Best hairstyles panel */
    .hair-best-panel { background: #0e0e0e; padding: 16px; }
    .hair-panel-title { font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
    .hair-best-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .hair-best-card { background: #141414; border: 1px solid rgba(255,255,255,.06); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; position: relative; transition: border-color .2s; }
    .hair-best-card:hover { border-color: rgba(255,255,255,.14); }
    .hair-best-card-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 8px 10px 4px; }
    .hair-best-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: rgba(255,255,255,.13); line-height: 1; }
    .hair-best-check { width: 20px; height: 20px; background: #1a7a3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; color: #fff; font-weight: 700; flex-shrink: 0; }
    .hair-best-name { font-size: .82rem; font-weight: 700; padding: 0 10px 4px; line-height: 1.2; }
    .hair-best-category { font-size: .58rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--red); padding: 0 10px 10px; }
    .hair-best-score { display: none; }
    .hair-best-tags { display: none; }

    /* Avoid section */
    .hair-avoid-section { border-top: 1px solid var(--border); }
    .hair-avoid-title-bar { background: rgba(193,18,31,.12); border-bottom: 1px solid rgba(193,18,31,.2); padding: 9px 16px; font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: rgba(193,18,31,.9); }
    .hair-avoid-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    .hair-avoid-card { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .hair-avoid-card:last-child { border-right: none; }
    .hair-avoid-card-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px 4px; }
    .hair-avoid-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: rgba(255,255,255,.10); line-height: 1; }
    .hair-avoid-x { width: 18px; height: 18px; background: rgba(193,18,31,.85); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .6rem; color: #fff; font-weight: 700; flex-shrink: 0; }
    .hair-avoid-name { font-size: .75rem; font-weight: 700; line-height: 1.2; padding: 0 10px 4px; }
    .hair-avoid-reason { font-size: .62rem; color: var(--text-sec); line-height: 1.4; padding: 0 10px 10px; }

    /* Length guide */
    .hair-length-section { border-top: 1px solid var(--border); padding: 20px; }
    .hair-section-title { font-size: .65rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }
    .hair-length-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .hair-length-card { background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .hair-length-card.active { border-color: rgba(255,255,255,.3); background: #222; }
    .hair-length-silhouette { width: 48px; height: 60px; display: flex; align-items: center; justify-content: center; }
    .hair-length-name { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .08em; }
    .hair-length-range { font-size: .7rem; color: var(--text-dim); }

    /* Styling tips + how to style */
    .hair-bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--border); }
    .hair-bottom-col { padding: 20px; }
    .hair-bottom-col:first-child { border-right: 1px solid var(--border); }
    .hair-products-list { display: flex; flex-direction: column; gap: 12px; }
    .hair-product-row { display: flex; align-items: center; gap: 12px; }
    .hair-product-icon { width: 36px; height: 36px; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .hair-product-info { flex: 1; }
    .hair-product-name { font-size: .82rem; font-weight: 600; }
    .hair-product-desc { font-size: .65rem; color: var(--text-dim); margin-top: 2px; }
    .hair-product-dots { display: flex; gap: 3px; margin-top: 4px; }
    .hair-product-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.15); }
    .hair-product-dot.on { background: #4ade80; }
    .hair-how-steps { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .hair-how-step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hair-how-step-icon { width: 40px; height: 40px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .hair-how-step-label { font-size: .58rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-dim); text-align: center; }
    .hair-how-arrow { color: rgba(255,255,255,.2); font-size: 1rem; margin-bottom: 16px; }

    /* Color guide */
    .hair-color-section { border-top: 1px solid var(--border); padding: 20px; }
    .hair-color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .hair-color-chip { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hair-color-swatch { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,.1); }
    .hair-color-chip-label { font-size: .58rem; color: var(--text-dim); }

    /* Barber tip */
    .hair-barber-tip { border-top: 1px solid var(--border); padding: 16px 20px; display: flex; gap: 10px; align-items: flex-start; background: rgba(193,18,31,.04); }
    .hair-barber-tip-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
    .hair-barber-tip-text { font-size: .82rem; color: rgba(255,255,255,.65); line-height: 1.55; }

    /* Responsive */
    @media (max-width: 640px) {
      .hair-top { grid-template-columns: 1fr; }
      .hair-profile-panel { border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; }
      .hair-profile-photo, .hair-profile-photo-placeholder { width: 100px; aspect-ratio: 3/4; }
      .hair-best-grid { grid-template-columns: repeat(2, 1fr); }
      .hair-avoid-grid { grid-template-columns: repeat(2, 1fr); }
      .hair-avoid-card { border-bottom: 1px solid var(--border); }
      .hair-bottom-grid { grid-template-columns: 1fr; }
      .hair-bottom-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .hair-length-cards { grid-template-columns: repeat(3, 1fr); }
    }

    /* ACTIONS */
    .results-actions { display: flex; justify-content: center; gap: 12px; padding: 32px 0 0; flex-wrap: wrap; }
    .results-action-btn { padding: 12px 28px; border-radius: 99px; font-size: .88rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all .25s; }
    .results-action-btn-red { background: var(--red); color: #fff; }
    .results-action-btn-red:hover { opacity: .88; transform: translateY(-2px); }
    .results-action-btn-ghost { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
    .results-action-btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,.2); }

    /* HAIRSTYLE IMAGE SLOTS */
    .hair-img-slot { width: 100%; aspect-ratio: 4/5; overflow: hidden; position: relative; background: #1c1c1c; }
    .hair-img-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hair-img-shimmer { width: 100%; height: 100%; background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .hair-img-gen-label { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.65); color: rgba(255,255,255,.4); font-size: .52rem; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
    .hair-img-error { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: rgba(255,255,255,.1); }
    .hair-avoid-img-slot { width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #1c1c1c; position: relative; }
    .hair-avoid-img-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* LOADING / ERROR STATES */
    .results-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .results-spinner { width: 44px; height: 44px; border: 3px solid rgba(193,18,31,.2); border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-error { text-align: center; padding: 80px 24px; }
    .results-error h2 { font-size: 1.4rem; margin-bottom: 12px; }
    .results-error p { color: var(--text-sec); margin-bottom: 24px; }

    /* NEW COMPONENT STYLES */
    .color-summary-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 16px; }
    .summary-tag { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 99px; padding: 3px 12px; font-size: .72rem; font-weight: 500; color: var(--text-sec); }
    .ai-swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .swatch-score { font-size: .6rem; font-weight: 700; color: rgba(74,222,128,.85); }
    .avoid-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .avoid-chip { background: rgba(193,18,31,.08); border: 1px solid rgba(193,18,31,.18); border-radius: 99px; padding: 5px 14px; font-size: .75rem; color: rgba(193,18,31,.85); }
    .ingredient-chip { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; font-size: .72rem; color: var(--text-sec); }
    .skin-goal-chip { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); border-radius: 99px; padding: 4px 12px; font-size: .72rem; color: rgba(34,197,94,.9); }
    .skin-score-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .skin-score-circle { display: flex; align-items: baseline; gap: 4px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 14px; padding: 12px 20px; flex-shrink: 0; }
    .skin-score-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; line-height: 1; color: #22c55e; }
    .skin-score-label { font-size: .75rem; color: var(--text-dim); }
    .skin-goals { display: flex; flex-wrap: wrap; gap: 6px; }
    .ai-outfit-piece { display: inline-flex; align-items: center; gap: 4px; font-size: .72rem; color: var(--text-sec); margin-right: 4px; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .ai-photo-grid-3 { grid-template-columns: repeat(2, 1fr); }
      .ai-photo-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .ai-color-grid { grid-template-columns: 1fr; }
      .ai-skincare-grid { grid-template-columns: 1fr; }
      .ai-user-photo-header { flex-direction: column; text-align: center; }
      .hair-top { grid-template-columns: 1fr; }
      .hair-profile-panel { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
      .hair-profile-photo, .hair-profile-photo-placeholder { width: 100px; flex-shrink: 0; }
      .hair-avoid-grid { grid-template-columns: repeat(2, 1fr); }
      .hair-avoid-card:nth-child(2n) { border-right: none; }
      .hair-avoid-card { border-bottom: 1px solid var(--border); }
      .hair-bottom-grid { grid-template-columns: 1fr; }
      .hair-bottom-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav-logo" href="/">
      <img src="Brand_assets/logo_redboxnew.jpeg" alt="Redbox Logo" />
      <span>REDBOX <em>BARBERSHOP</em></span>
    </a>
    <div class="nav-actions">
      <a class="nav-btn nav-btn-ghost" href="/#ai">✦ Coba Lagi</a>
      <a class="nav-btn nav-btn-red" href="/booking.html">Book Now</a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="results-hero">
    <div class="results-hero-eyebrow">
      <span class="results-hero-line"></span>
      <span class="results-hero-label">AI Grooming Analysis</span>
      <span class="results-hero-line"></span>
    </div>
    <h1>Hasil <em>Analisis AI</em> Kamu</h1>
    <p>Personal color · Outfit · Eyewear · Skincare · Hairstyle</p>
  </div>

  <!-- RESULTS CONTAINER -->
  <div class="results-container" id="results-container">
    <div class="results-loading" id="results-loading">
      <div class="results-spinner"></div>
      <p style="color:var(--text-sec);font-size:.9rem">Memuat hasil analisis...</p>
    </div>
  </div>

  <script src="js/ai-grooming.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('results-container');
      const loading = document.getElementById('results-loading');

      let raw, userPhoto;
      try {
        raw = sessionStorage.getItem('ai_results');
        userPhoto = sessionStorage.getItem('ai_user_photo');
      } catch (e) {}

      if (!raw) {
        loading.remove();
        container.innerHTML = `
          <div class="results-error">
            <h2>Tidak ada hasil ditemukan</h2>
            <p>Upload foto terlebih dahulu di halaman utama untuk mendapatkan analisis AI.</p>
            <a class="results-action-btn results-action-btn-red" href="/#ai">Upload Foto Sekarang</a>
          </div>`;
        return;
      }

      const results = JSON.parse(raw);
      const r = results.results || results;

      // Support both old and new JSON format
      const subject = r.subject || {};
      const color = r.personal_color_analysis || r.personalColor || {};
      const outfit = r.outfit_recommendation || r.outfit || {};
      const eyewear = r.eyewear_analysis || r.eyewear || {};
      const skin = r.skin_analysis || r.skincare || {};
      const hair = r.hairstyle_analysis || r.hairstyle || {};

      loading.remove();

      const fmt = s => s ? String(s).replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()) : '';

      const block = (num, icon, title, body) => `
        <div class="ai-section-block">
          <div class="ai-section-header">
            <span class="ai-section-num">${String(num).padStart(2,'0')}</span>
            <h3>${icon} ${title}</h3>
          </div>
          <div class="ai-section-body">${body}</div>
        </div>`;

      // ── User photo header ──
      const faceShape = subject.face_shape?.type || outfit.faceShape || hair.faceShape || '';
      const skinType = subject.skin?.type || skin.skinProfile?.type || '';
      const hairType = subject.hair?.type || hair.currentHair?.texture || '';
      const colorSeason = color.season || color.colorSeason || '';

      const photoHeader = userPhoto ? `
        <div class="ai-user-photo-header">
          <div class="ai-user-photo-wrap">
            <img class="ai-user-photo" src="${userPhoto}" alt="Your photo" />
            <span class="ai-user-photo-label">Your Photo</span>
          </div>
          <div class="ai-user-summary">
            ${colorSeason ? `<span class="ai-user-summary-tag">🎨 ${fmt(colorSeason)}</span>` : ''}
            ${faceShape ? `<span class="ai-user-summary-tag">📐 ${fmt(faceShape)} Face</span>` : ''}
            ${skinType ? `<span class="ai-user-summary-tag">✨ ${fmt(skinType)} Skin</span>` : ''}
            ${hairType ? `<span class="ai-user-summary-tag">💇 ${fmt(hairType)} Hair</span>` : ''}
          </div>
        </div>` : '';

      // ── 1. Personal Color ──
      const bestColors = color.best_colors || color.bestColors || [];
      const okayColors = color.okay_colors || [];
      const avoidColors = color.avoid_colors || color.avoidColors || [];
      const summaryTags = color.summary_tags || [];

      const colorHTML = `
        <div class="ai-color-season">${fmt(colorSeason) || '—'}</div>
        ${summaryTags.length ? `<div class="color-summary-tags">${summaryTags.map(t=>`<span class="summary-tag">${fmt(t)}</span>`).join('')}</div>` : ''}
        ${color.colorSeasonDescription ? `<p style="font-size:.85rem;color:var(--text-sec);margin:4px 0 12px">${color.colorSeasonDescription}</p>` : ''}
        <div style="display:flex;flex-direction:column;gap:18px;margin-top:14px">
          <div class="ai-color-group">
            <label>Best Colors</label>
            <div class="ai-swatches">
              ${bestColors.map(c=>`
                <div class="ai-swatch-wrap">
                  <div class="ai-swatch" style="background:${c.hex}" title="${c.name}"><span class="ai-swatch-tip">${c.name}</span></div>
                  ${c.score ? `<span class="swatch-score">${c.score}%</span>` : ''}
                </div>`).join('')}
            </div>
          </div>
          ${okayColors.length ? `
          <div class="ai-color-group">
            <label style="color:rgba(255,255,255,.35)">Okay Colors</label>
            <div class="ai-swatches">
              ${okayColors.map(c=>`
                <div class="ai-swatch-wrap">
                  <div class="ai-swatch" style="background:${c.hex};opacity:.7" title="${c.name}"><span class="ai-swatch-tip">${c.name}</span></div>
                </div>`).join('')}
            </div>
          </div>` : ''}
          <div class="ai-color-group">
            <label style="color:rgba(193,18,31,.8)">Avoid Colors</label>
            <div class="ai-swatches">
              ${avoidColors.map(c=>`
                <div class="ai-swatch-wrap">
                  <div class="ai-swatch" style="background:${c.hex};border-color:rgba(193,18,31,.4)" title="${c.name}"><span class="ai-swatch-tip">${c.name}</span></div>
                </div>`).join('')}
            </div>
          </div>
        </div>`;

      // ── 2. Outfit ──
      const outfitRecs = outfit.recommended_styles || outfit.recommendedOutfits || [];
      const outfitAvoid = outfit.avoid_styles || (outfit.avoidOutfits||[]).map(a=>a.style||a);

      const outfitHTML = `
        <div class="ai-photo-grid ai-photo-grid-3">
          ${outfitRecs.map(o => {
            const isNew = !!o.top;
            return `
            <div class="ai-photo-card">
              <div class="ai-photo-card-img-wrap">
                <div class="ai-photo-card-placeholder">👔</div>
                <span class="ai-photo-card-score">${o.score || o.rank ? (o.score || '') + '%' : ''}</span>
              </div>
              <div class="ai-photo-card-body">
                <div class="ai-photo-card-name">${o.title || o.name}</div>
                <div class="ai-photo-card-occasion">${o.fit || o.occasion || ''}</div>
                <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
                  ${isNew ? `
                    <span class="ai-outfit-piece">👕 ${o.top}</span>
                    <span class="ai-outfit-piece">👖 ${o.bottom}</span>
                    <span class="ai-outfit-piece">👟 ${o.shoes}</span>
                  ` : (o.items||[]).map(i=>`<span class="ai-outfit-piece"><span class="ai-outfit-piece-dot" style="background:${i.color}"></span>${i.description||i.piece}</span>`).join('')}
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
        ${outfitAvoid.length ? `
          <div class="ai-outfit-avoid" style="margin-top:16px">
            <label>Avoid</label>
            <div class="avoid-chips">
              ${outfitAvoid.map(a=>`<span class="avoid-chip">✕ ${typeof a==='string'?a:(a.style||a.name||a)}</span>`).join('')}
            </div>
          </div>` : ''}`;

      // ── 3. Eyewear ──
      const eyewearRecs = eyewear.recommended || eyewear.recommendations || [];
      const eyewearAvoid = eyewear.avoid || eyewear.avoidFrames || [];

      const eyewearHTML = `
        <div class="ai-section-sub-label">Recommended</div>
        <div class="ai-photo-grid ai-photo-grid-3">
          ${eyewearRecs.map(e => {
            const isNew = !!e.frame_color;
            return `
            <div class="ai-photo-card">
              <div class="ai-photo-card-img-wrap ai-photo-card-img-wide">
                <div class="ai-photo-card-placeholder">🕶️</div>
                <span class="ai-photo-card-score">${e.score || e.suitabilityScore || 80}%</span>
              </div>
              <div class="ai-photo-card-body">
                <div class="ai-photo-card-name">${e.model || e.name}</div>
                <div class="ai-eyewear-colors">
                  ${isNew
                    ? `<span class="ai-eyewear-color-tag">${e.material}</span><span class="ai-eyewear-color-tag">${e.frame_color}</span>`
                    : (e.recommendedColors||[]).map(c=>`<span class="ai-eyewear-color-tag">${c}</span>`).join('')}
                </div>
                ${e.whyItSuits ? `<div class="ai-photo-card-why" style="margin-top:6px">${e.whyItSuits}</div>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
        ${eyewearAvoid.length ? `
          <div class="ai-section-sub-label" style="color:var(--red);margin-top:20px">Avoid</div>
          <div class="ai-avoid-list">
            ${eyewearAvoid.map(a=>`<div class="ai-avoid-item"><span class="ai-avoid-x">✕</span><span><strong>${a.model||a.style}</strong> — ${a.reason}</span></div>`).join('')}
          </div>` : ''}
        ${eyewear.proTip ? `<div class="ai-eyewear-protip">💡 ${eyewear.proTip}</div>` : ''}`;

      // ── 4. Skincare ──
      const skinScore = skin.overall_score != null ? skin.overall_score : null;
      const skinGoals = skin.goals || [];
      const skinConcerns = skin.concerns || [];
      const skinMorning = skin.routine?.morning || skin.morningRoutine || [];
      const skinNight = skin.routine?.night || skin.eveningRoutine || [];
      const skinIngredients = skin.ingredients || [];

      const routineStep = (item, i) => {
        const isStr = typeof item === 'string';
        return `
          <div class="ai-routine-step">
            <span class="ai-step-num">${i+1}</span>
            <div class="ai-step-info">
              <strong>${isStr ? item : item.product}</strong>
              ${!isStr && item.purpose ? `<span>${item.purpose}</span>` : ''}
            </div>
          </div>`;
      };

      const skincareHTML = `
        ${skinScore != null ? `
          <div class="skin-score-row">
            <div class="skin-score-circle">
              <span class="skin-score-num">${skinScore}</span>
              <span class="skin-score-label">/100</span>
            </div>
            ${skinGoals.length ? `<div class="skin-goals">${skinGoals.map(g=>`<span class="skin-goal-chip">${g}</span>`).join('')}</div>` : ''}
          </div>` : skinGoals.length ? `<div class="skin-goals" style="margin-bottom:16px">${skinGoals.map(g=>`<span class="skin-goal-chip">${g}</span>`).join('')}</div>` : ''}
        <div class="ai-skincare-grid">
          <div class="ai-skincare-col">
            <label>☀️ Morning Routine</label>
            <div class="ai-routine-steps">${skinMorning.map(routineStep).join('')}</div>
          </div>
          <div class="ai-skincare-col">
            <label>🌙 Night Routine</label>
            <div class="ai-routine-steps">${skinNight.map(routineStep).join('')}</div>
          </div>
        </div>
        ${skinConcerns.length ? `
          <div style="margin-top:20px">
            <label class="ai-section-sub-label">Skin Concerns</label>
            <div class="ai-concerns-list">
              ${skinConcerns.map(c=>`
                <div class="ai-concern-item">
                  <div class="ai-concern-name">${c.type||c.issue}</div>
                  <span class="ai-concern-severity ${c.severity}">${c.severity}</span>
                  ${c.tip ? `<div class="ai-concern-tip">${c.tip}</div>` : ''}
                </div>`).join('')}
            </div>
          </div>` : ''}
        ${skinIngredients.length ? `
          <div style="margin-top:16px">
            <label class="ai-section-sub-label">Key Ingredients</label>
            <div class="avoid-chips">${skinIngredients.map(i=>`<span class="ingredient-chip">${i}</span>`).join('')}</div>
          </div>` : ''}`;

      // ── 5. Hairstyle infographic ──
      const hairRecs = hair.recommended_styles || hair.recommendations || [];
      const hairAvoid = hair.avoid_styles || hair.avoidHairstyles || [];
      const hairProductsRaw = hair.styling_products || hair.recommendations?.[0]?.stylingProducts || [];
      const hairFaceShape = subject.face_shape?.type || hair.faceShape || faceShape;
      const hairTextureVal = subject.hair?.type || hair.currentHair?.texture || '';
      const hairDensityVal = subject.hair?.density || hair.currentHair?.density || '';
      const hairLengthVal = subject.hair?.current_length || hair.currentHair?.length || 'medium';

      const hairTypeIcons = [
        { svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12 Q6 6 9 12 Q12 18 15 12 Q18 6 21 12"/></svg>`, label: fmt(hairTextureVal) || 'Wavy' },
        { svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="4" y1="14" x2="20" y2="14"/><line x1="4" y1="18" x2="20" y2="18"/></svg>`, label: fmt(hairDensityVal) || 'Medium' },
      ];

      const productIcons = ['🫙','💧','✨'];
      const productDescs = ['Volume & texture','Natural look','Hold & definition'];
      const productStrengths = [3,3,4];
      const products = hairProductsRaw.slice(0,3).concat(['Matte Clay','Sea Salt Spray','Texture Spray']).slice(0,3);

      const lengthOptions = [
        { name: 'SHORT', range: '3–6 cm', active: hairLengthVal === 'short' },
        { name: 'MEDIUM', range: '6–12 cm', active: hairLengthVal === 'medium' || !hairLengthVal },
        { name: 'LONG', range: '12+ cm', active: hairLengthVal === 'long' },
      ];

      const hairColorPalette = [
        {hex:'#2C1810',label:'Dark Brown'},{hex:'#5C3317',label:'Brown'},
        {hex:'#8B6914',label:'Caramel'},{hex:'#C4A882',label:'Light Brown'},{hex:'#888888',label:'Ash'},
      ];

      const hairHTML = `
        <div class="hair-infographic">
          <div class="hair-top">
            <div class="hair-profile-panel">
              ${userPhoto
                ? `<img class="hair-profile-photo" src="${userPhoto}" alt="Your photo" />`
                : `<div class="hair-profile-photo-placeholder">👤</div>`}
              <div class="hair-face-shape-block">
                <div class="hair-face-shape-text">
                  <div class="hair-label">Face Shape</div>
                  <div class="hair-value">${(hairFaceShape||'oval').toUpperCase()}</div>
                </div>
                <div class="hair-face-oval"></div>
              </div>
              <div class="hair-type-section">
                <div class="hair-label">Hair Type</div>
                <div class="hair-type-icons">
                  ${hairTypeIcons.map(t=>`
                    <div class="hair-type-icon-row">
                      <div class="hair-type-icon-wrap">${t.svg}</div>
                      <span class="hair-type-icon-label">${t.label}</span>
                    </div>`).join('')}
                </div>
              </div>
            </div>
            <div class="hair-best-panel">
              <div class="hair-panel-title">Best Hairstyles</div>
              <div class="hair-best-grid">
                ${hairRecs.slice(0,4).map((h,i)=>`
                  <div class="hair-best-card" data-hair-slot="rec-${i}" data-hair-name="${h.name}" data-hair-desc="${(h.match_reason||h.description||'').replace(/"/g,"'")}">
                    <div class="hair-img-slot" id="hair-img-rec-${i}">
                      <div class="hair-img-shimmer"></div>
                      <span class="hair-img-gen-label">Generating...</span>
                    </div>
                    <div class="hair-best-card-top">
                      <span class="hair-best-num">${String(i+1).padStart(2,'0')}</span>
                      <span class="hair-best-check">✓</span>
                    </div>
                    <div class="hair-best-name">${h.name}</div>
                    <div class="hair-best-category">${h.match_reason||h.category||''}</div>
                    ${h.score ? `<div style="padding:0 10px 8px;font-size:.68rem;color:rgba(74,222,128,.8);font-weight:600">${h.score}% match</div>` : ''}
                  </div>`).join('')}
              </div>
            </div>
          </div>
          ${hairAvoid.length ? `
          <div class="hair-avoid-section">
            <div class="hair-avoid-title-bar">Hairstyles to Avoid</div>
            <div class="hair-avoid-grid">
              ${hairAvoid.slice(0,4).map((a,i)=>`
                <div class="hair-avoid-card" data-hair-slot="avoid-${i}" data-hair-name="${a.name||a.style}" data-hair-desc="${(a.reason||'').replace(/"/g,"'")}">
                  <div class="hair-avoid-img-slot" id="hair-img-avoid-${i}">
                    <div class="hair-img-shimmer"></div>
                  </div>
                  <div class="hair-avoid-card-top">
                    <span class="hair-avoid-num">${String(i+1).padStart(2,'0')}</span>
                    <span class="hair-avoid-x">✕</span>
                  </div>
                  <div class="hair-avoid-name">${a.name||a.style}</div>
                  <div class="hair-avoid-reason">${a.reason}</div>
                </div>`).join('')}
            </div>
          </div>` : ''}
          <div class="hair-length-section">
            <div class="hair-section-title">Hair Length Guide</div>
            <div class="hair-length-cards">
              ${lengthOptions.map(l=>`
                <div class="hair-length-card${l.active?' active':''}">
                  <div class="hair-length-silhouette">
                    <svg width="40" height="56" viewBox="0 0 40 56" fill="none">
                      <ellipse cx="20" cy="18" rx="12" ry="14" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
                      <path d="${l.name==='SHORT'?'M10 30 Q20 38 30 30':l.name==='MEDIUM'?'M8 30 Q20 46 32 30':'M6 30 Q20 54 34 30'}" stroke="rgba(255,255,255,.4)" stroke-width="1.5" fill="none"/>
                    </svg>
                  </div>
                  <div class="hair-length-name">${l.name}</div>
                  <div class="hair-length-range">${l.range}</div>
                </div>`).join('')}
            </div>
          </div>
          <div class="hair-bottom-grid">
            <div class="hair-bottom-col">
              <div class="hair-section-title">Styling Tips</div>
              <div class="hair-products-list">
                ${products.map((p,i)=>`
                  <div class="hair-product-row">
                    <div class="hair-product-icon">${productIcons[i]||'💈'}</div>
                    <div class="hair-product-info">
                      <div class="hair-product-name">${p}</div>
                      <div class="hair-product-desc">${productDescs[i]||''}</div>
                      <div class="hair-product-dots">${[1,2,3,4,5].map(d=>`<span class="hair-product-dot${d<=productStrengths[i]?' on':''}"></span>`).join('')}</div>
                    </div>
                  </div>`).join('')}
              </div>
            </div>
            <div class="hair-bottom-col">
              <div class="hair-section-title">How to Style</div>
              <div class="hair-how-steps">
                ${[{icon:'💨',label:'Blow Dry'},{icon:'🤲',label:'Apply Product'},{icon:'✋',label:'Shape'},{icon:'✨',label:'Finish'}].map((s,i,arr)=>`
                  <div class="hair-how-step">
                    <div class="hair-how-step-icon">${s.icon}</div>
                    <div class="hair-how-step-label">${s.label}</div>
                  </div>${i<arr.length-1?'<span class="hair-how-arrow">→</span>':''}`).join('')}
              </div>
            </div>
          </div>
          <div class="hair-color-section">
            <div class="hair-section-title">Hair Color Guide</div>
            <div class="hair-color-row">
              ${hairColorPalette.map(c=>`
                <div class="hair-color-chip">
                  <div class="hair-color-swatch" style="background:${c.hex}"></div>
                  <span class="hair-color-chip-label">${c.label}</span>
                </div>`).join('')}
              <span style="font-size:.65rem;color:rgba(74,222,128,.8);margin-left:4px;align-self:center;">✓ Best Colors</span>
            </div>
          </div>
        </div>`;

      container.innerHTML = `
        ${photoHeader}
        ${block(1,'🎨','Personal Color Analysis', colorHTML)}
        ${block(2,'👔','Outfit Recommendations', outfitHTML)}
        ${block(3,'🕶️','Eyewear Recommendations', eyewearHTML)}
        ${block(4,'✨','Skincare Routine', skincareHTML)}
        ${block(5,'💈','Hair Recommendations', hairHTML)}
        <div class="results-actions">
          <a class="results-action-btn results-action-btn-red" href="/booking.html">✂️ Book Appointment</a>
          <a class="results-action-btn results-action-btn-ghost" href="/#ai">↩ Analisis Ulang</a>
        </div>`;

      const uploadId = (() => { try { return sessionStorage.getItem('ai_upload_id'); } catch(e) { return null; } })();
      if (uploadId) loadHairstyleImages(uploadId, hair);
    });

    async function loadHairstyleImages(uploadId, hair) {
      const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:3001/api/ai/hairstyle'
        : '/api/ai/hairstyle';

      const hairRecs = hair.recommended_styles || hair.recommendations || [];
      const hairAvoid = hair.avoid_styles || hair.avoidHairstyles || [];

      const slots = [
        ...hairRecs.slice(0,4).map((h,i) => ({
          elId: `hair-img-rec-${i}`,
          hairstyleName: h.name,
          hairstyleDescription: h.match_reason || h.description || '',
        })),
        ...hairAvoid.slice(0,4).map((a,i) => ({
          elId: `hair-img-avoid-${i}`,
          hairstyleName: a.name || a.style,
          hairstyleDescription: a.reason || '',
        })),
      ];

      async function fetchOne(slot) {
        const el = document.getElementById(slot.elId);
        if (!el) return;
        try {
          const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId, hairstyleName: slot.hairstyleName, hairstyleDescription: slot.hairstyleDescription }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error + (json.detail ? ': ' + json.detail : ''));
          el.innerHTML = `<img src="${json.imageUrl}" alt="${slot.hairstyleName}" />`;
        } catch(err) {
          el.innerHTML = `<div class="hair-img-error">💈</div>`;
          console.error('[HairstyleImg] ' + slot.hairstyleName + ':', err.message);
        }
      }

      const CONCURRENCY = 3;
      for (let i = 0; i < slots.length; i += CONCURRENCY) {
        await Promise.allSettled(slots.slice(i, i + CONCURRENCY).map(fetchOne));
      }
    }
  </script>
</body>
